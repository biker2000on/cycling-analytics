# Alembic configuration for cycling-analytics
# The actual sqlalchemy.url is overridden in alembic/env.py from app Settings.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — overridden at runtime by env.py
sqlalchemy.url = postgresql+psycopg2://cycling_user:cycling_pass@localhost:5433/cycling_analytics

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
